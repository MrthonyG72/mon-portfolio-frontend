<section class="portfolio" id="portfolio">
  <div class="container d-flex flex-column justify-content-between h-100">

    <div class="section-title flex-grow-1">
      <div class="row">
        <div class="col-lg-12">
          <div class="text-center">
            <h2 data-aos="heading-show" class="text_background">
              My Projects
              <span class="heading_background">Portfolio</span>
            </h2>
          </div>
        </div>
      </div>
    </div>

    <div class="section-content flex-grow-1">
      <div class="row portfolio-items">
        @for (project of projects(); track project.id) {
          <div class="col-xl-4 col-lg-4 col-md-6 mb-2 mt-4">
            <div class="portfolio-item">
              <div class="portfolio-single portfolio-image" style="cursor: pointer;" (click)="openDetails(project)">
                <div class="item-box">
                  <div class="item-image">
                    <img [src]="project.image || 'https://via.placeholder.com/510x600'" width="510" height="600" class="d-block img-fluid mx-auto" alt="">
                  </div>
                  <div class="item-details d-flex align-items-center">
                    <div class="item-details-ins text-center w-100">
                      <h3>{{ project.title }}</h3>
                      <p>{{ project.category }}</p>
                      <button class="btn btn-sm btn-outline-light">Voir Détails</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        }
      </div>
    </div>
  </div>

  @if (selectedProject) {
    <div class="modal-overlay" (click)="closeDetails()" style="position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; display:flex; justify-content:center; align-items:center;">
      <div class="modal-content" (click)="$event.stopPropagation()" style="background:#191919; padding:40px; border-radius:15px; color:#fff; max-width:600px;">
        <h3>{{ selectedProject.title }}</h3>
        <p>{{ selectedProject.summary }}</p>
        <button (click)="closeDetails()" class="btn btn-primary">Fermer</button>
      </div>
    </div>
  }
</section>
