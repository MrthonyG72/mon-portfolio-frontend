<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-links">
      @if (profile(); as p) {
        @if (p.cv_url || p.cv_file) {
          <a [href]="cvLink()" target="_blank" rel="noopener" class="footer-link">Télécharger le CV</a>
        }
        @if (p.github_url) {
          <a [href]="p.github_url" target="_blank" rel="noopener" class="footer-link" aria-label="GitHub">GitHub</a>
        }
        @if (p.linkedin_url) {
          <a [href]="p.linkedin_url" target="_blank" rel="noopener" class="footer-link" aria-label="LinkedIn">LinkedIn</a>
        }
      }
      @if (!profile()) {
        <a href="#" class="footer-link">CV</a>
        <a href="https://github.com" target="_blank" rel="noopener" class="footer-link">GitHub</a>
        <a href="https://linkedin.com" target="_blank" rel="noopener" class="footer-link">LinkedIn</a>
      }
    </div>
    <p class="copyright">© {{ year }} Anzouan Gomis Thony Axel · L3 Computer Science</p>
  </div>
</footer>
